services:
  redis:
    image: redis:alpine
    container_name: jaa-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: ./backend
    container_name: jaa-backend
    ports:
      - "3002:3002"
    environment:
      - REDIS_HOST=redis
      - PORT=3002
      - TZ=Europe/Copenhagen
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma2:9b}
      - OPENCODE_URL=${OPENCODE_URL:-http://host.docker.internal:4096}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
      - .:/app/shared # Adgang til alle job mapperne
      - /home/mgn/.gemini:/root/.gemini
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: jaa-frontend
    ports:
      - "3000:3000"
    environment:
      - TZ=Europe/Copenhagen
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules # Forhindrer at node_modules bliver overskrevet af den tomme lokale mappe
      - .:/app/shared # Adgang til dokumentation og output
    depends_on:
      - backend
    restart: unless-stopped
