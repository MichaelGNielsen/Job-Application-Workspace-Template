
<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>{{DOC_TITLE}}</title>
    <style>
        @page { size: A4; margin: 1.5cm; }
        @media print {
            .print-btn { display: none !important; }
            body { padding: 0; margin: 0; font-size: 10.5pt; }
        }
        body { 
            font-family: "Segoe UI", "Calibri", Arial, sans-serif; 
            color: #2c3e50; 
            line-height: 1.4; 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 40px;
            background-color: white;
        }
        header { 
            border-bottom: 3px solid #2c3e50; 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }
        .contact-info h1 { 
            margin: 0; 
            font-size: 1.8em; 
            color: #2c3e50; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 800;
        }
        .contact-info p { 
            margin: 2px 0; 
            font-size: 0.9em; 
            color: #555; 
            text-align: left !important;
        }
        .address-date-line {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 2px 0;
            width: 100%;
        }
        .address-date-line span:last-child {
            font-style: italic;
            color: #7f8c8d;
            font-size: 0.95em;
        }
        
        .content { min-height: 600px; }
        .content p { text-align: justify; text-justify: inter-word; }
        
        /* Specifik styling til Ansøgning-dele */
        .recipient { margin-bottom: 25px; line-height: 1.3; text-align: left; }
        .subject { font-weight: bold; margin-bottom: 25px; text-decoration: underline; text-align: left; }
        
        h1, h2, h3 { color: #2c3e50; margin-top: 1.5em; margin-bottom: 0.5em; text-align: left; }
        h1 { font-size: 1.6em; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        h2 { font-size: 1.3em; color: #34495e; border-left: 4px solid #2c3e50; padding-left: 10px; }
        
        p { margin-bottom: 12px; }
        ul { margin-bottom: 15px; padding-left: 20px; }
        li { margin-bottom: 5px; }
        
        .match-score { 
            background: #f8f9fa; 
            border: 1px solid #dee2e6; 
            padding: 15px; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 1.2em;
            margin: 20px 0;
            text-align: center;
            color: #2c3e50;
        }

        .signature { margin-top: 25px; }
        .signature p { margin: 0; line-height: 1.2; }
    </style>
</head>
<body>
    <header>
        <div class="contact-info">
            <h1>{{BRUGER_NAVN}}</h1>
            {{BRUGER_ADRESSE_BLOK}}
            <p>{{BRUGER_TLF}} | {{BRUGER_EMAIL}}</p>
        </div>
    </header>

    <div class="content">
        {{CONTENT}}
    </div>

    {{SIGNATURE_SECTION}}

</body>
</html>
